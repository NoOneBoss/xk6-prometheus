services:
  app:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  k6:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k6
    volumes:
      - ./script.js:/script.js
    depends_on:
      - prometheus
    command: ["run", "/script.js"]